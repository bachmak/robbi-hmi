version: '3.8'

services:
  client:
    build:
      context: ./client
    container_name: client
    volumes:
      - ./client/src:/app
    environment:
      - PLC_IP=172.18.24.235

  database:
    image: influxdb:2.8.0
    container_name: database
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=admin123
      - INFLUXDB_DB=robot
    volumes:
      - database_data:/var/lib/influxdb2
    restart: unless-stopped

  hmi:
    image: grafana/grafana:13.0.0-23336907879-ubuntu
    container_name: hmi
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
    volumes:
      - hmi_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  database_data:
  hmi_data:
